<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLOCK 리브랜딩 — Lee Sangyun</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Pretendard', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FFFFFF;
            color: #111111;
            font-family: 'Inter', 'Pretendard', ui-sans-serif, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .animate-on-scroll {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .animate-header {
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .animate-header.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .slide-img {
            transition: transform 0.3s ease-out;
        }

        .slide-img:hover {
            transform: translateY(-4px);
        }
    </style>
</head>

<body>
    <div class="min-h-screen bg-white text-[#111111] px-6 md:px-12 lg:px-16 py-10 max-w-[1920px] mx-auto overflow-hidden">

        <!-- Header -->
        <header class="flex justify-between items-center mb-10 md:mb-16 animate-header">
            <a href="index.html" class="font-medium text-base tracking-tight hover:text-blue-600 transition-colors flex items-center gap-2">
                <iconify-icon icon="lucide:arrow-left" width="16" height="16"></iconify-icon>
                Lee Sangyun
            </a>
            <nav class="flex gap-8 text-sm font-medium">
                <a href="index.html#about" class="hover:text-blue-600 transition-colors">About</a>
                <a href="index.html#work" class="hover:text-blue-600 transition-colors">Work</a>
            </nav>
        </header>


        <!-- Slides: 연속 스크롤 -->
        <main class="flex flex-col">
            <img src="OLOCK/images/slide-1.png"  class="w-full h-auto block" loading="eager" />
            <img src="OLOCK/images/slide-2.png"  class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-3.png"  class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-4.png"  class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-5.png"  class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-6.png"  class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-7.png"  class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-8.png"  class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-9.png"  class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-10.png" class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-11.png" class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-12.png" class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-13.png" class="w-full h-auto block" loading="lazy" />
            <img src="OLOCK/images/slide-14.png" class="w-full h-auto block" loading="lazy" />
        </main>

        <!-- Next Project -->
        <section class="mt-32 md:mt-48 pt-12 border-t border-[#E5E7EB] animate-on-scroll">
            <p class="text-xs font-medium text-[#6B7280] uppercase tracking-widest mb-6">Next Project</p>
            <a href="syrup.html" class="group flex items-center gap-3 hover:gap-4 transition-all duration-300">
                <span class="text-2xl md:text-4xl font-semibold tracking-tight group-hover:text-blue-600 transition-colors">Syrup 야금야금</span>
                <iconify-icon icon="lucide:arrow-right" width="24" height="24" class="text-[#6B7280] group-hover:text-blue-600 transition-colors"></iconify-icon>
            </a>
        </section>

        <!-- Footer -->
        <footer class="mt-32 md:mt-48 pt-8 flex flex-col md:flex-row justify-between items-start md:items-center text-sm font-medium text-[#6B7280] gap-8 animate-on-scroll">
            <div class="text-[#111111]">Lee Sangyun &copy; 2026</div>
            <div class="flex gap-8">
                <a href="mailto:sangyun88@gmail.com" class="hover:text-[#111111] transition-colors">Email</a>
                <a href="https://linkedin.com/in/sangyun88" target="_blank" class="hover:text-[#111111] transition-colors">LinkedIn</a>
            </div>
            <div class="flex items-center gap-2 text-[#111111]">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span id="live-time"></span>
            </div>
        </footer>

    </div>

    <script>
        (function () {
            var timeEl = document.getElementById('live-time');
            function updateTime() {
                var now = new Date();
                timeEl.textContent = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            }
            updateTime();
            setInterval(updateTime, 1000);
        })();
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.animate-header').forEach(function (el) {
                el.classList.add('visible');
            });

            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: '-50px 0px'
            });

            document.querySelectorAll('.animate-on-scroll').forEach(function (el) {
                observer.observe(el);
            });
        });
    </script>
</body>

</html>
